name: Update publications from Google Scholar

on:
  schedule:
    - cron: "0 3 * * 1" # every Monday at 3am UTC
  workflow_dispatch: # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install scholarly

      - name: Fetch publications
        run: python scripts/fetch_scholar.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update publications from Google Scholar"
          file_pattern: _bibliography/papers.bib
